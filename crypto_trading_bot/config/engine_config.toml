zmq_telemetry_bind = "tcp://0.0.0.0:5555"
zmq_config_bind = "tcp://0.0.0.0:5556"
regime_file_path = "/dev/shm/regime_state.json"
log_level = "info"
symbols = ["BTC_USDT", "ETH_USDT", "XAUT_USDT"]

# Gate.io is the SOLE exchange for all modes.
# API key selection is handled by TRADING_MODE env var in Rust engine:
#   live/paper:  GATEIO_API_KEY / GATEIO_SECRET_KEY
#   testnet:     GATEIO_TESTNET_API_KEY / GATEIO_TESTNET_SECRET_KEY
#   forex_live:  GATEIO_TRADFI_LOGIN / PASSWORD / SERVER (MT5)
#   forex_demo:  GATEIO_TRADFI_DEMO_LOGIN / PASSWORD / SERVER (MT5)
# Gate.io FUTURES exchange config.
# IMPORTANT: Use fx-api / fx-ws domains for futures trading, NOT spot (api.gateio.ws).
# Testnet overrides are applied automatically by the Rust engine when TRADING_MODE=testnet.
[[exchanges]]
name = "gateio"
api_key = "${GATEIO_API_KEY}"
secret_key = "${GATEIO_SECRET_KEY}"
testnet = false
ws_url = "wss://fx-ws.gateio.ws/v4/ws/usdt"        # Futures WebSocket (NOT spot)
rest_url = "https://fx-api.gateio.ws/api/v4"         # Futures REST API (NOT spot api.gateio.ws)
max_leverage = 20
symbols = ["BTC_USDT", "ETH_USDT", "XAUT_USDT"]

[strategy]
imbalance_threshold = 0.015
max_spread_bps = 150.0
min_bid_depth_usdt = 50.0
min_ask_depth_usdt = 50.0
min_vpin = 0.0
order_size_contracts = 1
post_only = false
enabled_symbols = []
leverage = 5
enabled = true

[risk]
max_drawdown_pct = 5.0
max_daily_loss_usdt = 200.0
max_open_positions = 3
circuit_breaker_loss_pct = 3.0
position_size_pct = 2.0

# CONFIG 1: Per-symbol trading profiles with full overrides
# BTC: High liquidity, conservative thresholds
[[pair_profiles]]
symbol = "BTC_USDT"
imbalance_threshold = 0.015
vpin_bucket_size = 5000.0
trailing_stop_atr_multiplier = 3.0
max_leverage = 10
max_position_size = 5
leverage = 5
sl_pct = 1.5
tp_pct = 3.0
tick_size = 0.1

[[pair_profiles]]
symbol = "ETH_USDT"
imbalance_threshold = 0.015
vpin_bucket_size = 2000.0
trailing_stop_atr_multiplier = 2.0
max_leverage = 10
max_position_size = 10
leverage = 5
sl_pct = 2.0
tp_pct = 4.0
tick_size = 0.01

[[pair_profiles]]
symbol = "SOL_USDT"
imbalance_threshold = 0.015
vpin_bucket_size = 1000.0
trailing_stop_atr_multiplier = 3.0
max_leverage = 10
max_position_size = 30
leverage = 5
sl_pct = 3.0
tp_pct = 6.0
tick_size = 0.001

# ============================================================================
# INSTITUTIONAL FEATURES CONFIGURATION
# These features bring the bot from 6.5/10 to 8+/10 rating
# ============================================================================

# Feature 1: Hardware Timestamp Support
# Reduces timestamp jitter from ~50us to ~100ns for ultra-low latency
[hw_timestamps]
enabled = false  # Requires compatible NIC with SO_TIMESTAMPING support

# Feature 2: Tick Database with Replay
# Persistent tick storage for backtesting and audit trails
[tick_store]
enabled = true
base_path = "/data/ticks"
retention_days = 30
sync_interval_ms = 1000
prealloc_ticks = 10000000  # ~480MB per symbol per day

# Feature 3: Real-Time VaR Engine
# Value at Risk calculation using historical simulation
[var_engine]
enabled = true
limit_pct = 0.05           # Maximum VaR as % of portfolio
confidence_level = 0.99    # 99% confidence level
update_interval_ms = 1000
rolling_window_minutes = 1000
# Trip circuit breaker if VaR utilization exceeds this threshold
circuit_breaker_threshold_pct = 90

# Feature 4: Options Greeks / Gamma Hedging
# Options-derived gamma exposure and delta hedging
[gamma_hedging]
enabled = false
options_data_source = "deribit"  # or "gateio_options"
flip_alert_threshold = 0.2
default_implied_vol = 0.50
risk_free_rate = 0.05
# Symbols to track gamma exposure
tracked_symbols = ["BTC_USDT", "ETH_USDT"]

# Feature 5: Multi-Exchange Arbitrage
# Cross-exchange arbitrage detection and execution
[arbitrage]
enabled = false
min_spread_bps = 10        # Minimum spread to consider arb
max_size_usdt = 10000.0    # Maximum arb position size
max_latency_us = 500       # Maximum acceptable latency
# Enabled exchanges (must have API keys configured)
enabled_exchanges = ["gateio"]  # Add "binance", "bybit" when keys available

# Feature 6: Fee Optimization
# Fee tier tracking and maker rebate optimization
[fee_optimizer]
enabled = true
exchange = "gateio"
refresh_hours = 24         # How often to refresh 30-day volume from exchange
prefer_maker_orders = true
# Volume thresholds are hardcoded per exchange (Gate.io VIP tiers)

# Feature 7: Adaptive TWAP/VWAP
# Intelligent order splitting with participation rate adaptation
[adaptive_twap]
enabled = true
target_participation = 0.05  # Target 5% of market volume
max_participation = 0.30     # Never exceed 30%
max_spread_bps = 20.0        # Pause if spread > 20 bps
vpin_high_threshold = 0.7    # Reduce size if VPIN > 70%
vpin_medium_threshold = 0.5  # Moderate reduction if VPIN > 50%
min_slice_pct = 0.01         # Minimum slice = 1% of order

# Feature 8: Alert Manager
# Centralized alerting with rate limiting and deduplication
[alert_manager]
enabled = true
rate_limit_per_minute = 10
dedup_window_secs = 300
min_priority = "info"  # "info", "warning", "critical", "emergency"
# Enabled channels (configure tokens in .env)
enabled_channels = ["telegram", "console"]

# Bybit exchange config (for multi-exchange arbitrage)
[[exchanges]]
name = "bybit"
api_key = "${BYBIT_API_KEY}"
secret_key = "${BYBIT_SECRET_KEY}"
testnet = false
ws_url = "wss://stream.bybit.com/v5/public/linear"

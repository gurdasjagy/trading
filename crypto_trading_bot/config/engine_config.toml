zmq_telemetry_bind = "tcp://0.0.0.0:5555"
zmq_config_bind = "tcp://0.0.0.0:5556"
regime_file_path = "/dev/shm/regime_state.json"
log_level = "info"
symbols = ["BTC_USDT", "ETH_USDT", "XAUT_USDT"]

# Gate.io is the SOLE exchange for all modes.
# API key selection is handled by TRADING_MODE env var in Rust engine:
#   live/paper:  GATEIO_API_KEY / GATEIO_SECRET_KEY
#   testnet:     GATEIO_TESTNET_API_KEY / GATEIO_TESTNET_SECRET_KEY
#   forex_live:  GATEIO_TRADFI_LOGIN / PASSWORD / SERVER (MT5)
#   forex_demo:  GATEIO_TRADFI_DEMO_LOGIN / PASSWORD / SERVER (MT5)
# Gate.io FUTURES exchange config.
# IMPORTANT: Use fx-api / fx-ws domains for futures trading, NOT spot (api.gateio.ws).
# Testnet overrides are applied automatically by the Rust engine when TRADING_MODE=testnet.
[[exchanges]]
name = "gateio"
api_key = "${GATEIO_API_KEY}"
secret_key = "${GATEIO_SECRET_KEY}"
testnet = false
ws_url = "wss://fx-ws.gateio.ws/v4/ws/usdt"        # Futures WebSocket (NOT spot)
rest_url = "https://fx-api.gateio.ws/api/v4"         # Futures REST API (NOT spot api.gateio.ws)
max_leverage = 20
symbols = ["BTC_USDT", "ETH_USDT", "XAUT_USDT"]

[strategy]
imbalance_threshold = 0.15
max_spread_bps = 10.0
min_bid_depth_usdt = 5000.0
min_ask_depth_usdt = 5000.0
min_vpin = 0.0
order_size_contracts = 1
post_only = true
enabled_symbols = []
leverage = 5
enabled = true

[risk]
max_drawdown_pct = 5.0
max_daily_loss_usdt = 200.0
max_open_positions = 3
circuit_breaker_loss_pct = 3.0
position_size_pct = 2.0

# Task 9: Pair-specific trading profiles (Phase 2 Feature 8)
# BTC: High liquidity, conservative thresholds
[[pair_profiles]]
symbol = "BTC_USDT"
imbalance_threshold = 0.05
vpin_bucket_size = 500000.0
trailing_stop_atr_multiplier = 3.0
max_leverage = 20

# ETH: Medium-high liquidity, moderate thresholds
[[pair_profiles]]
symbol = "ETH_USDT"
imbalance_threshold = 0.03
vpin_bucket_size = 200000.0
trailing_stop_atr_multiplier = 2.0
max_leverage = 25

# Task 9: SOL-Specific Pair Profile (Phase 2 Feature 8)
# SOL: Medium liquidity, aggressive thresholds
[[pair_profiles]]
symbol = "SOL_USDT"
imbalance_threshold = 0.05
vpin_bucket_size = 50000.0
trailing_stop_atr_multiplier = 3.0
max_leverage = 10


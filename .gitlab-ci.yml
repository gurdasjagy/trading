stages:
  - lint
  - test-python
  - test-rust
  - build

# ── Lint Python ───────────────────────────────────────────────────────────

lint-python:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install ruff
  script:
    - ruff check crypto_trading_bot/
  allow_failure: true

# ── Test Python ───────────────────────────────────────────────────────────

test-python:
  stage: test-python
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y gcc g++ make
    - pip install --upgrade pip
    - cd crypto_trading_bot
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
  script:
    - python -m pytest tests/ -v --tb=short
  allow_failure: true

# ── Check Rust ────────────────────────────────────────────────────────────

check-rust:
  stage: test-rust
  image: rust:1.78-slim
  before_script:
    - cd rust_engine
  script:
    - cargo check
    - cargo clippy -- -D warnings
  allow_failure: true

# ── Build Docker ──────────────────────────────────────────────────────────

build-docker:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - cd crypto_trading_bot
  script:
    - docker build -t crypto-trading-bot:latest .
  allow_failure: true

# GitLab Duo Coding Agent Configuration
# For: crypto_trading_bot + rust_engine trading system

container:
  image: "registry.gitlab.com/gitlab-org/gitlab-duo-agent/base:latest"

  setup_commands:
    # Python setup
      - cd crypto_trading_bot && pip install -r requirements.txt -r requirements-dev.txt
        - cd crypto_trading_bot && pip install -e .
          # Rust setup
            - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              - source $HOME/.cargo/env
                # Verification commands
                  - cd crypto_trading_bot && python -c "from config.settings import Settings; print('Python imports OK')"
                    - cd rust_engine && cargo check 2>&1 | tail -20
                      - cd crypto_trading_bot && python -m pytest tests/ -x --tb=short -q 2>&1 | tail -30
                      